{{- $home := cond (eq $.Site.Language.Lang "en") $.Site.Data.en.home $.Site.Data.home -}}
{{ with $home.clients }}
{{ if .enable }}

{{ "<!-- Section Clients -->" | safeHTML }}
<section class="section clients" id="section-clients">
  <div class="content">

    {{ "<!-- title -->" | safeHTML }}
    <div class="titles">
      <h2 class="title">{{ .title }}</h2>
      <div class="subtitle">{{ .subtitle }}</div>
    </div>

    {{ "<!-- clients items -->" | safeHTML }}
    <div class="content-carousel">
      <div class="owl-carousel" data-slidesview="4" data-slidesview_mobile="2">
        {{ range .items }}
        <div class="item">
          <div class="clients-item">
            <a target="_blank" href="{{ .url }}" rel="noopener noreferrer">
              <img src="{{ .image | absURL }}" alt="{{ .name | default "logo client" }}" loading="lazy" />
            </a>
          </div>
        </div>
        {{ end }}
      </div>

      {{ "<!-- navigation -->" | safeHTML }}
      <div class="navs">
        <span class="prev fas fa-chevron-left" role="button" tabindex="0" aria-label="Précédent"></span>
        <span class="next fas fa-chevron-right" role="button" tabindex="0" aria-label="Suivant"></span>
      </div>

    </div>

    <div class="clear"></div>
  </div>
</section>

{{ end }}
{{ end }}
