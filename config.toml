# General Settings
title = "Billel Attafi — Senior .NET Engineer"
baseURL = "https://billelattafi.rf.gd/"
theme = "myour"
resourceDir = "resources"
summaryLength = 20
DefaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false
ignoreLogs = ['warning-goldmark-raw-html']

[markup.goldmark.renderer]
unsafe = true

[pagination]
pagerSize = 6

# Languages
[languages]
  [languages.fr]
    languageName = "FR"
    languageCode = "fr"
    weight = 1
    title = "Billel Attafi — Senior .NET Engineer"
    [[languages.fr.menu.main]]
      identifier = "home"
      name = "Accueil"
      url = "/"
      weight = 1
    [[languages.fr.menu.main]]
      identifier = "about"
      name = "À propos"
      url = "#section-about"
      weight = 2
    [[languages.fr.menu.main]]
      identifier = "resume"
      name = "Parcours"
      url = "#section-experience"
      weight = 3
    [[languages.fr.menu.main]]
      identifier = "portfolio"
      name = "Portfolio"
      url = "#section-portfolio"
      weight = 4
    [[languages.fr.menu.main]]
      identifier = "contacts"
      name = "Contact"
      url = "#section-contacts"
      weight = 5

  [languages.en]
    languageName = "EN"
    languageCode = "en"
    weight = 2
    title = "Billel Attafi — Senior .NET Engineer"
    [[languages.en.menu.main]]
      identifier = "home"
      name = "Home"
      url = "/en/"
      weight = 1
    [[languages.en.menu.main]]
      identifier = "about"
      name = "About"
      url = "#section-about"
      weight = 2
    [[languages.en.menu.main]]
      identifier = "resume"
      name = "Resume"
      url = "#section-experience"
      weight = 3
    [[languages.en.menu.main]]
      identifier = "portfolio"
      name = "Portfolio"
      url = "#section-portfolio"
      weight = 4
    [[languages.en.menu.main]]
      identifier = "contacts"
      name = "Contact"
      url = "#section-contacts"
      weight = 5

# Main Settings
[params]
skinColor = ""
dateFormat = "January 2, 2006"
authorName = "Billel Attafi"
disqusComments = ""
formspreeURL = ""
googleAnalytics = ""

# Header Settings
[params.header]
logo_image = "images/logo.png"
logo_text = "Billel <br />Attafi"
logo_alt = "Billel Attafi"
button_text = "Télécharger CV"
button_url = "files/Resume-Template.pdf"
button_icon = "fas fa-download"
button_download = true

# Social Settings
[[params.social]]
title = "LinkedIn"
icon = "fab fa-linkedin"
url = "https://linkedin.com/in/billelattafi"
weight = 1
[[params.social]]
title = "GitHub"
icon = "fab fa-github"
url = "https://github.com/bidabil"
weight = 2

# Sidebar
[params.sidebar]
enable = 1
search = 1
latestPosts = 1
categories = 1
tags = 1

# Portfolio Settings
[params.portfolio]
homeNumOfItems = 12
[[params.portfolio.filters]]
name = "All"
slug = "f-all"
[[params.portfolio.filters]]
name = ".NET"
slug = "f-dotnet"
[[params.portfolio.filters]]
name = "DevSecOps"
slug = "f-devsecops"
[[params.portfolio.filters]]
name = "GIS"
slug = "f-gis"

# Sitemap Settings
[sitemap]
changefreq = "monthly"
priority = 0.5
filename = "sitemap.xml"

[outputs]
home = ["HTML", "RSS", "JSON"]
