### Resume [ resumeSection ]
resume:
  enable: true
  experience:
    title: "Expérience"
    subtitle: "Parcours professionnel"
    items:
      - year: "2025 — Présent"
        name: "Tech Lead – Senior Backend .NET <br />Davidson (Mission APRR — Flux Libre) | Dijon"
        text: "Conception d'une architecture backend scalable (Clean Architecture, Mediator, RabbitMQ). Modélisation PostgreSQL pour flux de péage à fort trafic. Pipelines CI/CD Azure DevOps et pratiques DevSecOps. Mentorat technique en contexte Agile."

      - year: "2024 — 2025"
        name: "Senior Backend .NET Developer <br />NOOEH (Mission Colis Privé — CMA CGM) | Marseille"
        text: "APIs géospatiales avancées (NetTopologySuite + PostGIS). Optimisation des batchs de calcul de distances : −40% de temps d'exécution. Solution de gestion des contours postaux et moteur de routage logistique. Encadrement équipe (5 devs)."

      - year: "2023 — 2024"
        name: "Software Development Engineer <br />My Kiwi (Mission ArcelorMittal) | Marseille"
        text: "Modernisation plateforme industrielle critique : migration Visual Basic 6 → .NET Core & Angular (+32% de performance). Intégration IoT pour analyse de données industrielles en temps réel."

      - year: "2023"
        name: "Responsable Pôle Développement C# <br />IT Systèmes | Paris"
        text: "Management d'une équipe de 8 développeurs .NET (+25% de productivité). Conception d'un plugin Microsoft Teams en Clean Architecture intégrant SharePoint et Azure AD via Microsoft Graph API."

      - year: "2015 — 2022"
        name: "Directeur Opérationnel / Chef de Projet / Full Stack <br />Hostaplast | Alger, Algérie"
        text: "Optimisation logistique nationale (4 000 points de vente) : −60% de coûts opérationnels. Développement d'une API géospatiale complète remplaçant Google Maps : −100% de coûts de licence. ERP complet .NET + SQL Server."

  education:
    title: "Formation"
    subtitle: "Parcours académique"
    items:
      - year: "2015 — 2017"
        name: "Master en Architecture Parallèle et Calcul Intensif <br />USTHB — Alger"
        text: "Spécialisation en systèmes distribués, calcul haute performance et architectures parallèles."

      - year: "2010 — 2015"
