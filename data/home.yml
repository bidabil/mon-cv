### Services [ serviceSection ]
services:
  enable: true
  title: "Services"
  subtitle: "Ce que je fais"
  items:
    - icon: "fas fa-layer-group"
      name: "Architecture <br />Backend"
      text: "Conception de systèmes distribués scalables en Clean Architecture, avec patterns avancés (CQRS, Mediator, Event-driven)."

    - icon: "fas fa-shield-alt"
      name: "Sécurité <br />& Conformité"
      text: "DevSecOps, pipelines CI/CD sécurisés avec SBOM, SAST, signature d'image Cosign, SLSA et conformité réglementaire."

    - icon: "fas fa-map-marked-alt"
      name: "Solutions <br />Géospatiales"
      text: "APIs géospatiales avancées, geocoding, routage et optimisation logistique avec PostGIS et NetTopologySuite."

    - icon: "fas fa-database"
      name: "Performance <br />& Data"
      text: "Optimisation PostgreSQL (indexation, partitionnement, JSONB), traitement de données IoT et batchs haute performance."

    - icon: "fas fa-project-diagram"
      name: "Modernisation <br />SI"
      text: "Audit, migration et modernisation du parc applicatif pour structures réglementées. Accompagnement à la transformation numérique."

    - icon: "fas fa-users"
      name: "Leadership <br />Technique"
      text: "Mentorat d'équipes (jusqu'à 8 devs), code review, décisions d'architecture et accompagnement Agile/Scrum."

