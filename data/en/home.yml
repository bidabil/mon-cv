        name: "COO / Project Manager / Full Stack Developer <br />Hostaplast | Algiers, Algeria"
        text: "National logistics optimization across 4,000 sales points: −60% operational costs. Internal geospatial API replacing Google Maps entirely: −100% licensing costs. Full .NET + SQL Server ERP."

